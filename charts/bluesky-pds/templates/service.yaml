apiVersion: v1
kind: Service
metadata:
  name: bluesky-pds
  labels:
    app: bluesky-pds
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: bluesky-pds
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
