apiVersion: apps/v1
kind: Deployment
metadata:
  name: aly-codes
  labels:
    app: aly-codes
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aly-codes
  template:
    metadata:
      labels:
        app: aly-codes
    spec:
      containers:
        - name: aly-codes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
