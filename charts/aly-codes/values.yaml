replicaCount: 2
spread: true

image:
  repository: ghcr.io/alyraffauf/aly.codes
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

ports:
  - name: http
    containerPort: 80

service:
  type: NodePort
  ports:
    - name: http
      port: 80
      nodePort: 8282

probes:
  liveness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 2
    periodSeconds: 5

ingress:
  enabled: true
  className: traefik
  routes:
    - host: aly.codes
      aliases: [www.aly.codes]
      tlsSecret: aly-codes-tls
