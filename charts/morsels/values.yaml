image:
  repository: ghcr.io/alyraffauf/morsels
  tag: latest
  pullPolicy: Always

dnsPolicy: Default

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

persistence:
  storageClassName: longhorn
  size: 256Mi

ingress:
  enabled: true
  className: traefik
  hosts:
    - morsels.blue
    - www.morsels.blue
  tls:
    - hosts:
        - morsels.blue
        - www.morsels.blue
      secretName: morsels-blue-tls
