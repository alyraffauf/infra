replicaCount: 1
strategy: Recreate
dnsPolicy: Default

image:
  repository: ghcr.io/alyraffauf/morsels
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ports:
  - name: http
    containerPort: 8000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000

persistence:
  enabled: true
  storageClassName: longhorn
  size: 256Mi
  mountPath: /data

probes:
  liveness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 30
    periodSeconds: 15
  readiness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 10
    periodSeconds: 5

ingress:
  enabled: true
  className: traefik
  routes:
    - host: morsels.blue
      aliases: [www.morsels.blue]
      tlsSecret: morsels-blue-tls
