image:
  repository: louislam/uptime-kuma
  tag: "2"
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

persistence:
  storageClassName: longhorn
  size: 1Gi

ingress:
  enabled: true
  className: traefik
  # one entry per public hostname — each uses its own TLS secret
  routes:
    - host: kuma.cute.haus
      tlsSecret: cute-haus-tls
    - host: status.cute.haus
      tlsSecret: cute-haus-tls
    - host: status.aly.codes
      tlsSecret: aly-codes-tls
    - host: status.aly.social
      tlsSecret: aly-social-tls
