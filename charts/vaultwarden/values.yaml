replicaCount: 1
strategy: Recreate

image:
  repository: vaultwarden/server
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

ports:
  - name: http
    containerPort: 8222

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8222

persistence:
  enabled: true
  storageClassName: longhorn
  size: 1Gi
  mountPath: /data

env:
  DOMAIN: https://vault.cute.haus
  ROCKET_ADDRESS: 0.0.0.0
  ROCKET_PORT: "8222"
  ROCKET_LOG: critical
  SIGNUPS_ALLOWED: "false"

# Templated by common.secret from .Values.secret (vals + sops).
envFromSecret: vaultwarden-env

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /alive, port: http }
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    httpGet: { path: /alive, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /alive, port: http }
    periodSeconds: 10

ingress:
  enabled: true
  className: traefik
  routes:
    - host: vault.cute.haus
      tlsSecret: cute-haus-tls
