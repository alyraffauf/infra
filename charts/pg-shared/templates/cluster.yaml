apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName }}

  storage:
    storageClass: {{ .Values.cluster.storage.storageClass }}
    size: {{ .Values.cluster.storage.size }}

  resources:
    {{- toYaml .Values.cluster.resources | nindent 4 }}

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: {{ .Values.cluster.topologyKey }}

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          cnpg.io/cluster: {{ .Values.cluster.name }}

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
      effective_cache_size: 768MB
      work_mem: 8MB
      maintenance_work_mem: 64MB

  monitoring:
    enablePodMonitor: false

  {{- if .Values.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath }}
      endpointURL: {{ .Values.backup.endpointURL }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.cluster.name }}-b2
          key: KEY_ID
        secretAccessKey:
          name: {{ .Values.cluster.name }}-b2
          key: APP_KEY
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
  {{- end }}
