apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  labels:
    app: forgejo
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
