{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
  labels:
    app: forgejo
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    {{- range .Values.ingress.routes }}
    - hosts: [{{ .host }}]
      secretName: {{ .tlsSecret }}
    {{- end }}
  rules:
    {{- range .Values.ingress.routes }}
    - host: {{ .host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forgejo
                port:
                  name: http
    {{- end }}
{{- end }}
