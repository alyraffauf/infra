replicaCount: 1
strategy: Recreate

image:
  repository: codeberg.org/forgejo/forgejo
  tag: "15"
  # Stops a registry hiccup at pod-restart time from wedging the deployment
  # (codeberg has had 502s). Tradeoff: bumping tag is the only way to update.
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Matches USER_UID/USER_GID below — forgejo's docker-entrypoint runs as
# uid/gid 1000 and needs write access to /var/lib/forgejo on the PVC.
podSecurityContext:
  fsGroup: 1000

ports:
  - name: http
    containerPort: 3001
  - name: ssh
    containerPort: 2222

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: ssh
      port: 2222
      targetPort: ssh

persistence:
  # B2 (rclone) is the offsite safety net for repos / LFS / attachments,
  # so this PVC just needs to survive single-node loss. Uses pg-shared's
  # StorageClass to keep all postgres-adjacent PVCs on one class.
  enabled: true
  storageClassName: longhorn-pg
  size: 10Gi
  mountPath: /var/lib/forgejo

env:
  USER_UID: "1000"
  USER_GID: "1000"
  FORGEJO_WORK_DIR: /var/lib/forgejo
  FORGEJO_CUSTOM: /var/lib/forgejo/custom

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /api/healthz, port: http }
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    httpGet: { path: /api/healthz, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /api/healthz, port: http }
    periodSeconds: 10

ingress:
  enabled: true
  className: traefik
  routes:
    - host: git.aly.codes
      tlsSecret: aly-codes-tls
