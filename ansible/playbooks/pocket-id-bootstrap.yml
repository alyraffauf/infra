---
# Reconciles Pocket ID application config + OIDC clients + per-app integrations.
#
# To add a new OIDC client:
#   1. Append an entry to vars/oidc-clients.yml.
#   2. If the app runs in k3s and needs its credentials wired in, add a task
#      file under tasks/integrations/<integration>.yml and set
#      `integration: <integration>` on the client.
#   3. If the app is configured elsewhere (NixOS, manual UI), omit
#      `integration`; the oidc-client-<slug> K8s Secret still holds the creds.
# Requires an admin API key in secrets/pocket-id.yaml.
- name: Bootstrap Pocket ID
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    pocket_id_url: https://id.cute.haus
    k8s_namespace: default
    oidc_client_list_limit: 200

  vars_files:
    - vars/pocket-id.yml
    - vars/oidc-clients.yml

  tasks:
    - name: Load Pocket ID secrets from sops
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../../secrets/pocket-id.yaml"
        name: pocket_id_secrets

    - name: Reconcile application configuration (incl. SMTP)
      ansible.builtin.include_tasks: tasks/ensure-app-config.yml

    - name: List existing OIDC clients
      ansible.builtin.uri:
        url: "{{ pocket_id_url }}/api/oidc/clients?pagination[limit]={{ oidc_client_list_limit }}"
        headers:
          X-API-KEY: "{{ pocket_id_secrets.admin_api_key }}"
        return_content: true
      register: existing_clients_response
      check_mode: false

    - name: Index existing clients by name
      ansible.builtin.set_fact:
        existing_clients_by_name: >-
          {{
            dict(
              (existing_clients_response.json.data | default([]))
              | map(attribute='name')
              | zip(existing_clients_response.json.data | default([]))
            )
          }}

    - name: Reconcile each declared client
      ansible.builtin.include_tasks: tasks/ensure-oidc-client.yml
      loop: "{{ oidc_clients }}"
      loop_control:
        loop_var: client_spec
        label: "{{ client_spec.slug }}"

    - name: Wire each client into its target app
      ansible.builtin.include_tasks: "tasks/integrations/{{ client_spec.integration }}.yml"
      loop: "{{ oidc_clients | selectattr('integration', 'defined') }}"
      loop_control:
        loop_var: client_spec
        label: "{{ client_spec.integration }}"
      vars:
        oidc_client_credentials: "{{ oidc_client_credentials_by_slug[client_spec.slug] }}"
