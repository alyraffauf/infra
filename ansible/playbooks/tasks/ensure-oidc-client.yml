---
# Orchestrate the lifecycle of one OIDC client:
#   1. Resolve the current K8s + Pocket ID state.
#   2. Create the client if it does not exist.
#   3. Sync any configuration drift.
#   4. Ensure a K8s Secret exists with valid credentials.
#   5. Upload the app logo if provided.

# -----------------------------------------------------------------------------
# Phase 1: Resolve current state
# -----------------------------------------------------------------------------
- name: "[{{ client_spec.slug }}] Look up K8s Secret"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ k8s_namespace }}"
    name: "oidc-client-{{ client_spec.slug }}"
  register: kubernetes_secret_lookup

- name: "[{{ client_spec.slug }}] Initialize state facts"
  ansible.builtin.set_fact:
    oidc_client_record: "{{ existing_clients_by_name[client_spec.name] | default(none) }}"
    kubernetes_secret_exists: "{{ (kubernetes_secret_lookup.resources | length) > 0 }}"

- name: "[{{ client_spec.slug }}] Delete stale K8s Secret"
  when:
    - oidc_client_record is none
    - kubernetes_secret_exists
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    namespace: "{{ k8s_namespace }}"
    name: "oidc-client-{{ client_spec.slug }}"

# -----------------------------------------------------------------------------
# Phase 2: Build payloads and create the client if missing
# -----------------------------------------------------------------------------
- name: "[{{ client_spec.slug }}] Build desired/current client payloads"
  ansible.builtin.include_tasks: oidc/build-client-payloads.yml

- name: "[{{ client_spec.slug }}] Create client if missing"
  ansible.builtin.include_tasks: oidc/create-client.yml

# -----------------------------------------------------------------------------
# Phase 3: Sync configuration drift for existing clients
# -----------------------------------------------------------------------------
- name: "[{{ client_spec.slug }}] Sync client configuration"
  when:
    - existing_clients_by_name[client_spec.name] is defined
    - (desired_oidc_client | to_json) != (current_oidc_client | default({}) | to_json)
  ansible.builtin.uri:
    url: "{{ pocket_id_url }}/api/oidc/clients/{{ oidc_client_record.id }}"
    method: PUT
    headers:
      X-API-KEY: "{{ pocket_id_secrets.admin_api_key }}"
    body_format: json
    body: "{{ desired_oidc_client }}"
    status_code: [200, 204]

# -----------------------------------------------------------------------------
# Phase 4: Ensure credentials are available in K8s
# -----------------------------------------------------------------------------
- name: "[{{ client_spec.slug }}] Ensure credentials Secret"
  ansible.builtin.include_tasks: oidc/ensure-credentials-secret.yml

# -----------------------------------------------------------------------------
# Phase 5: Upload app logo
# -----------------------------------------------------------------------------
- name: "[{{ client_spec.slug }}] Upload logo"
  when:
    - client_spec.logoUrl is defined
    - not (oidc_client_record.hasLogo | default(false))
  ansible.builtin.include_tasks: oidc/upload-logo.yml
