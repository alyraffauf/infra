---
# The K8s Secret may be missing even when the client exists (manual cleanup,
# restore from backup, etc.). Generate a fresh secret and write it back.
- name: "[{{ client_spec.slug }}] Warn about rotating a missing Secret"
  when:
    - not kubernetes_secret_exists
    - existing_clients_by_name[client_spec.name] is defined
  ansible.builtin.debug:
    msg: >-
      Client existed in Pocket ID but K8s Secret was missing — rotating
      client_secret. Apps using the old value will break until they pick
      up the new K8s Secret.

- name: "[{{ client_spec.slug }}] Generate client_secret"
  when: not kubernetes_secret_exists
  ansible.builtin.uri:
    url: "{{ pocket_id_url }}/api/oidc/clients/{{ oidc_client_record.id }}/secret"
    method: POST
    headers:
      X-API-KEY: "{{ pocket_id_secrets.admin_api_key }}"
    status_code: [200, 201]
  register: secret_rotation_response
  no_log: true

- name: "[{{ client_spec.slug }}] Write K8s Secret"
  when: not kubernetes_secret_exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "oidc-client-{{ client_spec.slug }}"
        namespace: "{{ k8s_namespace }}"
        labels:
          app.kubernetes.io/managed-by: ansible-oidc-bootstrap
          app.kubernetes.io/component: oidc-client
        annotations:
          helm.sh/resource-policy: keep
          oidc.cute.haus/client-name: "{{ client_spec.name }}"
          oidc.cute.haus/client-id: "{{ oidc_client_record.id }}"
      type: Opaque
      stringData:
        client_id: "{{ oidc_client_record.id }}"
        client_secret: "{{ secret_rotation_response.json.secret }}"
  no_log: true

- name: "[{{ client_spec.slug }}] Read back credentials"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ k8s_namespace }}"
    name: "oidc-client-{{ client_spec.slug }}"
  register: kubernetes_secret_final
  no_log: true

- name: "[{{ client_spec.slug }}] Stash credentials for integration tasks"
  ansible.builtin.set_fact:
    oidc_client_credentials_by_slug: >-
      {{
        (oidc_client_credentials_by_slug | default({})) | combine({
          client_spec.slug: {
            'client_id':     kubernetes_secret_final.resources[0].data.client_id     | b64decode,
            'client_secret': kubernetes_secret_final.resources[0].data.client_secret | b64decode,
          }
        })
      }}
  no_log: true
