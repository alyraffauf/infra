---
# Shared helper: write/update an SSO env Secret and rollout-restart the
# Deployment if it changed. Caller passes:
#   secret_name      — K8s Secret name
#   secret_data      — dict of env var names → values
#   deployment_name  — Deployment to restart on change
# The target namespace is client_spec.namespace if set (per-client override),
# else the playbook-level k8s_namespace default.
- name: "[{{ client_spec.slug }}] Write SSO env Secret"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ secret_name }}"
        namespace: "{{ client_spec.namespace | default(k8s_namespace) }}"
        labels:
          app.kubernetes.io/managed-by: ansible-oidc-bootstrap
          app.kubernetes.io/component: sso-env
        annotations:
          helm.sh/resource-policy: keep
      type: Opaque
      stringData: "{{ secret_data }}"
  no_log: true
  register: sso_secret

- name: "[{{ client_spec.slug }}] Rollout restart to pick up new env"
  when: sso_secret.changed
  kubernetes.core.k8s:
    state: patched
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ client_spec.namespace | default(k8s_namespace) }}"
    name: "{{ deployment_name }}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date -u +%FT%TZ') }}"
