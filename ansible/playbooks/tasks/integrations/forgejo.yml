---
# `cute.haus` is both the auth source name (button label) and the URL slug
# in the Pocket ID callback (/user/oauth2/cute.haus/callback) — keep aligned.
- name: "[forgejo] Find a running pod"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ k8s_namespace }}"
    label_selectors:
      - app=forgejo
    field_selectors:
      - status.phase=Running
  register: forgejo_pods

- name: "[forgejo] Fail if no pod is running"
  ansible.builtin.fail:
    msg: "No running forgejo pod in namespace {{ k8s_namespace }}"
  when: (forgejo_pods.resources | length) == 0

- name: "[forgejo] Pick a pod"
  ansible.builtin.set_fact:
    forgejo_pod: "{{ forgejo_pods.resources[0].metadata.name }}"

- name: "[forgejo] List auth sources"
  kubernetes.core.k8s_exec:
    namespace: "{{ k8s_namespace }}"
    pod: "{{ forgejo_pod }}"
    command: su -s /bin/sh git -c "forgejo admin auth list"
  register: forgejo_auth_list

- name: "[forgejo] Find cute.haus source ID (if any)"
  ansible.builtin.set_fact:
    forgejo_source_id: >-
      {{
        forgejo_auth_list.stdout_lines[1:]
          | map('regex_search', '^(\d+)\s+cute\.haus\s+', '\1')
          | select('truthy')
          | flatten
          | first
          | default(none)
      }}

# Explicit empty strings clear fields that update-oauth's cli.IsSet semantics
# would otherwise leave untouched on re-runs.
- name: "[forgejo] Add auth source"
  when: forgejo_source_id is none
  kubernetes.core.k8s_exec:
    namespace: "{{ k8s_namespace }}"
    pod: "{{ forgejo_pod }}"
    command: >-
      su -s /bin/sh git -c "forgejo admin auth add-oauth
      --name 'cute.haus'
      --provider 'openidConnect'
      --key '{{ client_credentials_map[client_spec.key].client_id }}'
      --secret '{{ client_credentials_map[client_spec.key].client_secret }}'
      --auto-discover-url '{{ pocket_id_url }}/.well-known/openid-configuration'
      --scopes 'openid profile email'
      --group-claim-name ''
      --admin-group ''
      --required-claim-name ''
      --required-claim-value ''
      --restricted-group ''"
  no_log: true

- name: "[forgejo] Update auth source"
  when: forgejo_source_id is not none
  kubernetes.core.k8s_exec:
    namespace: "{{ k8s_namespace }}"
    pod: "{{ forgejo_pod }}"
    command: >-
      su -s /bin/sh git -c "forgejo admin auth update-oauth
      --id {{ forgejo_source_id }}
      --name 'cute.haus'
      --provider 'openidConnect'
      --key '{{ client_credentials_map[client_spec.key].client_id }}'
      --secret '{{ client_credentials_map[client_spec.key].client_secret }}'
      --auto-discover-url '{{ pocket_id_url }}/.well-known/openid-configuration'
      --scopes 'openid profile email'
      --group-claim-name ''
      --admin-group ''
      --required-claim-name ''
      --required-claim-value ''
      --restricted-group ''"
  no_log: true
