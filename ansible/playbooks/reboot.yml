- hosts: cutehaus
  remote_user: root
  serial: 1
  any_errors_fatal: true

  vars:
    drain_timeout: 600

  tasks:
    - name: Cordon node
      ansible.builtin.command: kubectl cordon {{ inventory_hostname }}
      delegate_to: localhost
      changed_when: true

    # --disable-eviction skips PDB checks (Longhorn instance-manager and
    # single-replica CNPG pods otherwise block eviction indefinitely).
    - name: Drain node
      ansible.builtin.command: >-
        kubectl drain {{ inventory_hostname }}
        --ignore-daemonsets
        --delete-emptydir-data
        --force
        --disable-eviction
        --timeout={{ drain_timeout }}s
      delegate_to: localhost
      changed_when: true

    - name: Reboot host
      ansible.builtin.reboot:
        reboot_command: /run/current-system/sw/bin/systemctl reboot

    - name: Wait for node to be Ready
      ansible.builtin.command: >-
        kubectl wait --for=condition=Ready node/{{ inventory_hostname }}
        --timeout={{ drain_timeout }}s
      delegate_to: localhost
      changed_when: false

    - name: Uncordon node
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      delegate_to: localhost
      changed_when: true
