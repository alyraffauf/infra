oidc_clients:
  - key: forgejo
    name: Forgejo
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/forgejo.png
    launchURL: https://git.aly.codes/
    callbackURLs:
      - https://git.aly.codes/user/oauth2/cute.haus/callback
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
    integration: forgejo

  - key: tranquil
    name: Tranquil
    launchURL: https://pds.cute.haus/
    callbackURLs:
      - https://pds.cute.haus/oauth/sso/callback
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
    integration: tranquil

  # immich runs on jubilife (NixOS), not k8s — no integration task. Read
  # creds from the oidc-client-immich K8s Secret and feed them into the
  # immich NixOS module via sops.
  - key: immich
    name: Immich
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/immich.png
    launchURL: https://immich.cute.haus/
    callbackURLs:
      - https://immich.cute.haus/auth/login
      - app.immich:/
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
