oidc_clients:
  - slug: forgejo
    name: Forgejo
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/forgejo.png
    launchURL: https://git.aly.codes/
    callbackURLs:
      - https://git.aly.codes/user/oauth2/cute.haus/callback
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
    integration: forgejo

  - slug: tranquil
    name: Tranquil
    launchURL: https://pds.cute.haus/
    callbackURLs:
      - https://pds.cute.haus/oauth/sso/callback
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
    integration: tranquil

  # Slug must match the forward-auth-<app> Deployment name.
  - slug: forward-auth-navidrome
    name: Navidrome
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/navidrome.png
    launchURL: https://navidrome.cute.haus/
    callbackURLs:
      - https://auth-navidrome.cute.haus/_oauth
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: false
    integration: forward-auth

  # immich runs on jubilife (NixOS), not k8s — no integration task. Read
  # creds from the oidc-client-immich K8s Secret and feed them into the
  # immich NixOS module via sops.
  - slug: immich
    name: Immich
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/immich.png
    launchURL: https://immich.cute.haus/
    callbackURLs:
      - https://immich.cute.haus/auth/login
      - app.immich:/
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true

  - slug: audiobookshelf
    name: Audiobookshelf
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/audiobookshelf.png
    launchURL: https://audiobookshelf.cute.haus/
    callbackURLs:
      - https://audiobookshelf.cute.haus/audiobookshelf/auth/openid/callback
      - https://audiobookshelf.cute.haus/audiobookshelf/auth/openid/mobile-redirect
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true

  - slug: paperless
    name: Paperless
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/paperless-ngx.png
    launchURL: https://paperless.cute.haus/
    callbackURLs:
      - https://paperless.cute.haus/accounts/oidc/pocket-id/login/callback/
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
    integration: paperless

  - slug: nextcloud
    name: Nextcloud
    logoUrl: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/nextcloud.png
    launchURL: https://nextcloud.cute.haus/
    callbackURLs:
      - https://nextcloud.cute.haus/apps/user_oidc/code
    logoutCallbackURLs: []
    isPublic: false
    pkceEnabled: true
    integration: nextcloud
