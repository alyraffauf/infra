apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
      nodeSelector:
        kubernetes.io/hostname: jubilife
      containers:
        - name: {{ .Chart.Name }}
          image: deluan/navidrome:0.63.2@sha256:9012939114fbb1bb641b81cf96dec5ded15f0aafefe8d47a511d7cb919658e40
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -a
              . /run/secrets/navidrome/navidrome.env
              set +a
              exec /app/navidrome
          env:
            - name: ND_ADDRESS
              value: "0.0.0.0"
            - name: ND_PORT
              value: "4533"
            - name: ND_DATAFOLDER
              value: "/data"
            - name: ND_MUSICFOLDER
              value: "/mnt/Media/Music"
            - name: ND_LYRICSPRIORITY
              value: ".lrc,nd-lyrics,.txt,embedded"
            - name: ND_DEFAULTTHEME
              value: "Auto"
            - name: ND_ENABLEUSEREDITING
              value: "false"
            - name: ND_SUBSONICARTISTPARTICIPATIONS
              value: "true"
            - name: ND_UIWELCOMEMESSAGE
              value: "Welcome to Navidrome @ k3s"
            - name: ND_EXTAUTH_USERHEADER
              value: "X-Forwarded-User"
            - name: ND_EXTAUTH_TRUSTEDSOURCES
              value: "100.64.0.0/10,10.42.0.0/16"
          ports:
            - name: http
              containerPort: 4533
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: media
              mountPath: /mnt/Media
              readOnly: true
            - name: env
              mountPath: /run/secrets/navidrome
              readOnly: true
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-data
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-media
            readOnly: true
        - name: env
          secret:
            secretName: navidrome-env
