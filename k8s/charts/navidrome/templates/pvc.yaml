apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-data
  labels:
    app: {{ .Chart.Name }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Chart.Name }}-media
  labels:
    app: {{ .Chart.Name }}
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=3
    - hard
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
  nfs:
    server: 100.81.61.31
    path: /mnt/Media
    readOnly: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-media
  labels:
    app: {{ .Chart.Name }}
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: {{ .Chart.Name }}-media
  resources:
    requests:
      storage: 1Ti
