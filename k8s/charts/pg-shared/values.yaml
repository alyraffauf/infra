cluster:
  name: pg-shared
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:dabf20b4a1d0d2d26ad3f39b25dc57a270ffdaf0ca7105a6c897dc9f17c0ac83
  postgresVersion: 17

  # local-path: node-local SSD for low-latency fsync. CNPG handles HA via
  # streaming replication across instances; replicated block storage
  # underneath is double-paying for HA at the cost of write latency.
  storage:
    storageClass: local-path
    size: 5Gi

  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "3"
      memory: 3Gi

  # Spread instances across control-plane nodes
  topologyKey: kubernetes.io/hostname

# Tuned for a small shared cluster; bump if individual apps need more
# connections or heavier analytical workloads.
postgresql:
  parameters:
    max_connections: "200"
    shared_buffers: 1GB
    effective_cache_size: 2GB
    work_mem: 16MB
    maintenance_work_mem: 128MB
    random_page_cost: "1.1"
    effective_io_concurrency: "200"

# Declarative CNPG roles + databases. Password Secrets are first-class SOPS
# manifests under k8s/flux/secrets and are referenced by role name.
roles: {}

# B2 backup target for CNPG base backups + WAL archiving.
# Credentials come from the first-class pg-shared-b2 Secret.
backup:
  enabled: false
  destinationPath: s3://aly-backups/cute.haus/cnpg
  endpointURL: https://s3.us-east-005.backblazeb2.com
  # Quartz cron (6 fields: sec min hour dom mon dow). Daily at 04:00 UTC.
  schedule: "0 0 4 * * *"
  retentionPolicy: "30d"
