cluster:
  name: pg-shared
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6@sha256:30b304a2e300ed80b6d1b740e4369e9b0f25599fb518de78c01fd9f25531791b
  postgresVersion: 17

  # local-path: node-local SSD for low-latency fsync. CNPG handles HA via
  # streaming replication across instances; replicated block storage
  # underneath is double-paying for HA at the cost of write latency.
  storage:
    storageClass: local-path
    size: 5Gi

  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "3"
      memory: 3Gi

  # Spread instances across control-plane nodes
  topologyKey: kubernetes.io/hostname

# Shorten the per-pod toleration for not-ready/unreachable taints so CNPG
# fails over to a healthy replica sooner when a node dies. Default would be
# 300s; mirroring the 60s we use for app pods cuts forgejo etc. recovery
# time from ~6min to ~2min.
failover:
  fastTolerationSeconds: 60

# Declarative role + database management. Each entry produces:
#   - kubernetes.io/basic-auth Secret (<name>-pg-creds) consumed by CNPG
#   - entry under Cluster.spec.managed.roles[] (CNPG creates/maintains role)
#   - Database CRD owned by the role (defaults to role name; override via
#     `database: <name>`).
# Passwords come from values/secrets/pg-shared.yaml via vals + sops.
# Apps consume their connection string via DATABASE_URL refs into
# secrets/pg-roles.yaml.
roles: {}

# B2 (S3-compatible) backup of the cnpg cluster. WAL archiving is continuous;
# base backup runs on the schedule below. WAL retention is implicit — CNPG
# keeps enough WAL to PITR from the oldest base backup within retentionPolicy.
# Filled by values/secrets/pg-shared.yaml.
backup:
  enabled: false
  destinationPath: s3://aly-backups/cute.haus/cnpg
  endpointURL: https://s3.us-east-005.backblazeb2.com
  # Quartz cron (6 fields: sec min hour dom mon dow). Daily at 04:00 UTC.
  schedule: "0 0 4 * * *"
  retentionPolicy: "30d"
  b2:
    keyId: ""
    appKey: ""
