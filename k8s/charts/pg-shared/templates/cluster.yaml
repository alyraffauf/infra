apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName }}

  storage:
    storageClass: {{ .Values.cluster.storage.storageClass }}
    size: {{ .Values.cluster.storage.size }}

  resources:
    {{- toYaml .Values.cluster.resources | nindent 4 }}

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: {{ .Values.cluster.topologyKey }}
    # Soft preference: cloud (100) > home (50, default).
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: [cloud]
        - weight: 50
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: [home]
    tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          cnpg.io/cluster: {{ .Values.cluster.name }}

  postgresql:
    {{- toYaml .Values.postgresql | nindent 4 }}

  monitoring:
    enablePodMonitor: false

  {{- with .Values.roles }}
  managed:
    roles:
      {{- range $name, $_ := . }}
      - name: {{ $name }}
        ensure: present
        login: true
        passwordSecret:
          name: {{ $name }}-pg-creds
      {{- end }}
  {{- end }}

  {{- if .Values.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath }}
      endpointURL: {{ .Values.backup.endpointURL }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.cluster.name }}-b2
          key: KEY_ID
        secretAccessKey:
          name: {{ .Values.cluster.name }}-b2
          key: APP_KEY
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
  {{- end }}
