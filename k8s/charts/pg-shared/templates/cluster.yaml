apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName }}

  storage:
    storageClass: {{ .Values.cluster.storage.storageClass }}
    size: {{ .Values.cluster.storage.size }}

  resources:
    {{- toYaml .Values.cluster.resources | nindent 4 }}

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: {{ .Values.cluster.topologyKey }}
    # Soft preference: ovhcloud/netcup (100) > home (50) > hetzner (0, last resort).
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: [cloud-ovhcloud, cloud-netcup]
        - weight: 50
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: [home]
    {{- with .Values.failover }}
    {{- if .fastTolerationSeconds }}
    tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: {{ .fastTolerationSeconds }}
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: {{ .fastTolerationSeconds }}
    {{- end }}
    {{- end }}

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          cnpg.io/cluster: {{ .Values.cluster.name }}

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 1GB
      effective_cache_size: 2GB
      work_mem: 16MB
      maintenance_work_mem: 128MB
      random_page_cost: "1.1"
      effective_io_concurrency: "200"

  monitoring:
    enablePodMonitor: false

  {{- with .Values.roles }}
  managed:
    roles:
      {{- range $name, $_ := . }}
      - name: {{ $name }}
        ensure: present
        login: true
        passwordSecret:
          name: {{ $name }}-pg-creds
      {{- end }}
  {{- end }}

  {{- if .Values.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath }}
      endpointURL: {{ .Values.backup.endpointURL }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.cluster.name }}-b2
          key: KEY_ID
        secretAccessKey:
          name: {{ .Values.cluster.name }}-b2
          key: APP_KEY
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
  {{- end }}
