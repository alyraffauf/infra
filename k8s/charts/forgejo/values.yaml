replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 15

image:
  repository: codeberg.org/forgejo/forgejo
  tag: 15@sha256:db04c7114b656f896e206ba3873fe8d3a7adf2daa44907037f0274f4ba653fb9
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Matches USER_UID/USER_GID below — forgejo's docker-entrypoint runs as
# uid/gid 1000 and needs write access to /var/lib/forgejo on the PVC.
podSecurityContext:
  fsGroup: 1000

ports:
  - name: http
    containerPort: 3001
  - name: ssh
    containerPort: 2222

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: ssh
      port: 2222
      targetPort: ssh

persistence:
  enabled: true
  storageClassName: longhorn
  size: 10Gi
  mountPath: /var/lib/forgejo

env:
  USER_UID: "1000"
  USER_GID: "1000"
  FORGEJO_WORK_DIR: /var/lib/forgejo
  FORGEJO_CUSTOM: /var/lib/forgejo/custom
  FORGEJO__database__DB_TYPE: postgres
  FORGEJO__database__HOST: pg-shared-rw.cnpg-system.svc:5432
  FORGEJO__database__NAME: forgejo
  FORGEJO__database__USER: forgejo
  FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "true"
  FORGEJO__repository__ENABLE_PUSH_CREATE_ORG: "true"
  FORGEJO__log__LOGGER_SSH_MODE: file
  FORGEJO__oauth2_client__ACCOUNT_LINKING: login
  FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
  # DBs 1-3 on the shared valkey instance (paperless uses db 0).
  FORGEJO__cache__ENABLED: "true"
  FORGEJO__cache__ADAPTER: redis
  FORGEJO__cache__HOST: redis://valkey.default.svc:6379/1
  FORGEJO__session__PROVIDER: redis
  FORGEJO__session__PROVIDER_CONFIG: redis://valkey.default.svc:6379/2
  FORGEJO__queue__TYPE: redis
  FORGEJO__queue__CONN_STR: redis://valkey.default.svc:6379/3

secret: {}
envFromSecret:
  - forgejo-env

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /api/healthz, port: http }
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    httpGet: { path: /api/healthz, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /api/healthz, port: http }
    periodSeconds: 5
    failureThreshold: 2

ingress:
  enabled: true
  className: traefik
  routes:
    - host: git.aly.codes
      tlsSecret: aly-codes-tls

ssh:
  enabled: true
  port: 2222
