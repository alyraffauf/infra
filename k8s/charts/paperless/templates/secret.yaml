{{- if .Values.secret }}
apiVersion: v1
kind: Secret
metadata:
  name: paperless-env
  labels:
    app: {{ .Chart.Name }}
type: Opaque
stringData:
  PAPERLESS_ADMIN_PASSWORD: {{ .Values.secret.PAPERLESS_ADMIN_PASSWORD | quote }}
  PAPERLESS_DBPASS: {{ .Values.secret.PAPERLESS_DBPASS | quote }}
  PAPERLESS_SECRET_KEY: {{ .Values.secret.PAPERLESS_SECRET_KEY | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: paperless-rclone
  labels:
    app: {{ .Chart.Name }}
type: Opaque
stringData:
  RCLONE_CONFIG_B2_TYPE: {{ .Values.secret.RCLONE_CONFIG_B2_TYPE | quote }}
  RCLONE_CONFIG_B2_ACCOUNT: {{ .Values.secret.RCLONE_CONFIG_B2_ACCOUNT | quote }}
  RCLONE_CONFIG_B2_KEY: {{ .Values.secret.RCLONE_CONFIG_B2_KEY | quote }}
{{- end }}
