replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 30

# Off — k8s would auto-inject PAPERLESS_PORT=tcp://... from our Service.
enableServiceLinks: false

image:
  repository: ghcr.io/paperless-ngx/paperless-ngx
  tag: latest@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
  pullPolicy: IfNotPresent

podSecurityContext:
  fsGroup: 1000

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

ports:
  - name: http
    containerPort: 8000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000

env:
  PAPERLESS_URL: https://paperless.cute.haus
  PAPERLESS_USE_X_FORWARD_HOST: "true"
  PAPERLESS_USE_X_FORWARD_PORT: "true"
  PAPERLESS_PROXY_SSL_HEADER: '["HTTP_X_FORWARDED_PROTO", "https"]'
  PAPERLESS_TIME_ZONE: America/New_York
  PAPERLESS_WEBSERVER_WORKERS: "4"
  PAPERLESS_OCR_LANGUAGE: eng
  PAPERLESS_REDIS: redis://valkey.default.svc:6379/0
  PAPERLESS_DBHOST: pg-shared-rw.cnpg-system.svc
  PAPERLESS_DBPORT: "5432"
  PAPERLESS_DBNAME: paperless
  PAPERLESS_DBUSER: paperless
  PAPERLESS_ADMIN_USER: alyraffauf
  PAPERLESS_ADMIN_MAIL: alyraffauf@fastmail.com
  # Writable paths under the PVC, not under the image's /usr/src/paperless.
  PAPERLESS_DATA_DIR: /paperless/data
  PAPERLESS_MEDIA_ROOT: /paperless/media
  PAPERLESS_CONSUMPTION_DIR: /paperless/consume
  PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
  PAPERLESS_SOCIAL_AUTO_SIGNUP: "True"
  PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL: https
  PAPERLESS_ACCOUNT_DEFAULT_GROUP: users

secret: {}
envFromSecret:
  - paperless-env
  - paperless-sso-env

persistence:
  enabled: true
  storageClassName: longhorn
  size: 5Gi

extraVolumeMounts:
  - name: data
    mountPath: /paperless/data
    subPath: data
  - name: data
    mountPath: /paperless/consume
    subPath: consume

failover:
  fastTolerationSeconds: 60

rclone:
  image:
    repository: rclone/rclone
    tag: 1.74@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
    pullPolicy: IfNotPresent
  remote: b2:aly-apps/paperless-ngx
  mountPath: /paperless/media
  vfsCacheMaxAge: 168h
  vfsCacheMaxSize: 5G
  allowOther: true
  uid: 1000
  gid: 1000

probes:
  startup:
    httpGet: { path: /api/, port: http }
    periodSeconds: 5
    failureThreshold: 60
    timeoutSeconds: 5
  liveness:
    httpGet: { path: /api/, port: http }
    periodSeconds: 30
    timeoutSeconds: 5
  readiness:
    httpGet: { path: /api/, port: http }
    periodSeconds: 10
    timeoutSeconds: 5

ingress:
  enabled: true
  className: traefik
  routes:
    - host: paperless.cute.haus
      tlsSecret: cute-haus-tls
