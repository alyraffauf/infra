apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 15
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
      containers:
        - name: {{ .Chart.Name }}
          image: ghcr.io/pocket-id/pocket-id:v2@sha256:a2a38a96699d7483d65b5849b015d954f294938306a03a9c0699bc5b79554e86
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_URL
              value: "https://id.cute.haus"
            - name: TRUST_PROXY
              value: "true"
            - name: DB_PROVIDER
              value: "postgres"
            - name: FILE_BACKEND
              value: "database"
          envFrom:
            - secretRef:
                name: pocket-id-env
          ports:
            - name: http
              containerPort: 1411
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 60
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 2
