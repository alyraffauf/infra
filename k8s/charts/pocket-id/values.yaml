replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 15

image:
  repository: ghcr.io/pocket-id/pocket-id
  tag: v2@sha256:45bdeaf3fcd6d07cf8721e98785d93324bb8e65b586498874c05a3d489c8094e
  pullPolicy: IfNotPresent

# pocket-id's container entrypoint runs as uid/gid 1000.
podSecurityContext:
  fsGroup: 1000

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

ports:
  - name: http
    containerPort: 1411

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 1411

env:
  APP_URL: https://id.cute.haus
  TRUST_PROXY: "true"
  DB_PROVIDER: postgres
  FILE_BACKEND: database

secret: {}
envFromSecret:
  - pocket-id-env

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 5
    failureThreshold: 60
  liveness:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 5
    failureThreshold: 2

ingress:
  enabled: true
  className: traefik
  routes:
    - host: id.cute.haus
      tlsSecret: cute-haus-tls
