apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      terminationGracePeriodSeconds: 15
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      containers:
        - name: {{ .Chart.Name }}
          image: valkey/valkey:9-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
          imagePullPolicy: IfNotPresent
          args:
            - valkey-server
            - --maxmemory
            - 1gb
            - --maxmemory-policy
            - volatile-lru
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-data
