apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 15
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
      containers:
        - name: {{ .Chart.Name }}
          image: valkey/valkey:9-alpine@sha256:ee91f7a174ac4d6a6b0685b3a60e321f0a9dbbb691f9b0e285be2ba1d1be8328
          imagePullPolicy: IfNotPresent
          args:
            {{- toYaml .Values.args | nindent 12 }}
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-data
