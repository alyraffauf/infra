replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 15

image:
  repository: valkey/valkey
  tag: 9-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 1536Mi

# volatile-lru evicts only keys with a TTL (cache entries, sessions) once
# maxmemory is hit, leaving non-expiring queue/broker keys (paperless celery,
# forgejo queue) untouched — so a big cache can't starve the queue of writes.
args:
  - valkey-server
  - --maxmemory
  - 1gb
  - --maxmemory-policy
  - volatile-lru

ports:
  - name: valkey
    containerPort: 6379

service:
  type: ClusterIP
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey

# valkey-server's default config already saves RDB snapshots to /data.
persistence:
  enabled: true
  storageClassName: longhorn
  size: 1Gi

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    tcpSocket: { port: valkey }
    periodSeconds: 5
    failureThreshold: 12
  liveness:
    tcpSocket: { port: valkey }
    periodSeconds: 30
  readiness:
    tcpSocket: { port: valkey }
    periodSeconds: 10
