{{- range $route := .Values.routes }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $route.name }}
  labels:
    app: {{ $route.name }}
spec:
  ports:
    - name: http
      port: {{ $route.target.port }}
      protocol: TCP
      targetPort: {{ $route.target.port }}
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: {{ $route.name }}
  labels:
    app: {{ $route.name }}
    kubernetes.io/service-name: {{ $route.name }}
addressType: IPv4
ports:
  - name: http
    port: {{ $route.target.port }}
    protocol: TCP
endpoints:
  - addresses:
      - {{ $route.target.ip }}
    conditions:
      ready: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $route.name }}
  labels:
    app: {{ $route.name }}
  {{- $annotations := dict }}
  {{- if $route.tailscaleHostname }}
  {{- $_ := set $annotations "tailscale.com/hostname" $route.tailscaleHostname }}
  {{- end }}
  {{- if $route.middlewares }}
  {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" (join "," $route.middlewares) }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- range $k, $v := $annotations }}
    {{ $k | quote }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- $class := $route.ingressClassName | default $.Values.ingressClassName }}
  ingressClassName: {{ $class }}
  {{- $hosts := prepend (default (list) $route.aliases) $route.host }}
  {{- if or $route.tls (eq $class "tailscale") }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . }}
        {{- end }}
      {{- if and $route.tls $route.tls.secretName }}
      secretName: {{ $route.tls.secretName }}
      {{- end }}
  {{- end }}
  {{- if eq $class "tailscale" }}
  defaultBackend:
    service:
      name: {{ $route.name }}
      port:
        number: {{ $route.target.port }}
  {{- else }}
  rules:
    {{- range $hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $route.name }}
                port:
                  number: {{ $route.target.port }}
    {{- end }}
  {{- end }}
{{- end }}
