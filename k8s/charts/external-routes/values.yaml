ingressClassName: traefik

# Each route gets a Service + Endpoints + Ingress.
# Service name == route name. Tls secret must exist in the same namespace as the Ingress (default).
routes:
  - name: immich
    host: immich.cute.haus
    target: { ip: 100.81.61.31, port: 2283 } # jubilife
    tls: { secretName: cute-haus-tls }

  - name: jellyfin
    host: jellyfin.cute.haus
    target: { ip: 100.81.61.31, port: 8096 } # jubilife
    tls: { secretName: cute-haus-tls }

  - name: plex
    host: plex.cute.haus
    target: { ip: 100.81.61.31, port: 32400 } # jubilife
    tls: { secretName: cute-haus-tls }
