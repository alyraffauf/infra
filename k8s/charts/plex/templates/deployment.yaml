apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # hostNetwork so GDM auto-discovery, DLNA and the router-forwarded
      # remote-access port (32400) all reach Plex directly on jubilife.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: jubilife
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      initContainers:
        # Add custom plugins/scanners
        - name: plugins
          image: {{ .Values.global.images.alpine }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              PMS="/config/Library/Application Support/Plex Media Server"
              PLUGINS="$PMS/Plug-ins"; SCANNERS="$PMS/Scanners"; STAGE="$PMS/.plugin-staging"
              mkdir -p "$PLUGINS" "$SCANNERS"
              rm -rf "$STAGE"; mkdir -p "$STAGE"
              fetch() { echo "==> $1 @ $2"; wget -qO- "https://github.com/$1/archive/$2.tar.gz" | tar -xz -C "$STAGE"; }
              {{- range .Values.plugins.bundles }}
              fetch "{{ .repo }}" "{{ .rev }}"
              rm -rf "$PLUGINS/{{ .name }}"
              mv "$STAGE"/*-{{ .rev }} "$PLUGINS/{{ .name }}"
              {{- end }}
              {{- range .Values.plugins.scanners }}
              fetch "{{ .repo }}" "{{ .rev }}"
              cp -rf "$STAGE"/*-{{ .rev }}/Scanners/. "$SCANNERS/"
              rm -rf "$STAGE"/*-{{ .rev }}
              {{- end }}
              rm -rf "$STAGE"
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: {{ .Chart.Name }}
          image: docker.io/plexinc/pms-docker:1.43.2.10687-563d026ea@sha256:c37106c57fed7a6624f5dee5a3ce460ff011f09a2aa7f4ee9e8dbbd08ae1b87e
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "America/New_York"
            # Must match the owner of /mnt/Data/plex (chown during cutover).
            - name: PLEX_UID
              value: "1000"
            - name: PLEX_GID
              value: "1000"
            - name: ADVERTISE_IP
              value: "https://plex.cute.haus:443"
          ports:
            - name: pms
              containerPort: 32400
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
              gpu.intel.com/i915: "1" # HW transcode — requires Plex Pass
            limits:
              cpu: "4"
              memory: 4Gi
              gpu.intel.com/i915: "1"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /mnt/Media
              readOnly: true
            - name: backblaze
              mountPath: /mnt/Backblaze
              readOnly: true
              mountPropagation: HostToContainer
          startupProbe:
            httpGet:
              path: /identity
              port: pms
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /identity
              port: pms
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /identity
              port: pms
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-config
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-media
            readOnly: true
        - name: backblaze
          hostPath:
            path: /mnt/Backblaze
            type: Directory
