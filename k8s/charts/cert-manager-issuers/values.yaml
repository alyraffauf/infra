letsencrypt:
  email: aly@aly.codes
  server: https://acme-v02.api.letsencrypt.org/directory # use https://acme-staging-v02.api.letsencrypt.org/directory for testing

# Populated from values/secrets/cert-manager.yaml.
cloudflare:
  apiToken: ""

# Wildcard certs to issue, one per zone. Each becomes a Secret in the named
# namespace, referenced by ingresses via tlsSecret.
wildcards:
  - name: cute-haus-tls
    namespace: default
    domain: cute.haus
  - name: aly-social-tls
    namespace: default
    domain: aly.social
  - name: aly-codes-tls
    namespace: default
    domain: aly.codes
  - name: cute-haus-tls
    namespace: websites
    domain: cute.haus
  - name: aly-codes-tls
    namespace: websites
    domain: aly.codes
  - name: morsels-blue-tls
    namespace: websites
    domain: morsels.blue
