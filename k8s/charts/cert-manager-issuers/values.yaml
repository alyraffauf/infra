letsencrypt:
  email: aly@aly.codes
  server: https://acme-v02.api.letsencrypt.org/directory # use https://acme-staging-v02.api.letsencrypt.org/directory for testing

# Populated from values/secrets/cert-manager.yaml.
cloudflare:
  apiToken: ""

# Wildcard certs to issue, one per zone. Each becomes a Secret in the named
# namespace; reflector mirrors it into the replicateTo namespaces so their
# ingresses can reference the same secretName without a second issuance.
wildcards:
  - name: cute-haus-tls
    namespace: default
    domain: cute.haus
    replicateTo:
      - nextcloud
      - websites
  - name: aly-social-tls
    namespace: default
    domain: aly.social
  - name: aly-codes-tls
    namespace: default
    domain: aly.codes
    replicateTo:
      - websites
  - name: morsels-blue-tls
    namespace: websites
    domain: morsels.blue
  - name: cute-haus-tls
    namespace: microcosm
    domain: cute.haus
