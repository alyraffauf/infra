apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 15
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
      containers:
        - name: {{ .Chart.Name }}
          image: ghcr.io/bluesky-social/pds:latest@sha256:1fa8bbceabb65d8e1710749b1ea92c1c20a7489ca38da4a0a5f64c0c10a70c29
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_ENABLED
              value: "true"
            - name: PDS_BSKY_APP_VIEW_DID
              value: "did:web:api.bsky.app"
            - name: PDS_BSKY_APP_VIEW_URL
              value: "https://api.bsky.app"
            - name: PDS_BLOBSTORE_DISK_LOCATION
              value: "/pds/blocks"
            - name: PDS_BLOB_UPLOAD_LIMIT
              value: "104857600"
            - name: PDS_CRAWLERS
              value: "https://bsky.network"
            - name: PDS_DATA_DIRECTORY
              value: "/pds"
            - name: PDS_DID_PLC_URL
              value: "https://plc.directory"
            - name: PDS_HOSTNAME
              value: "aly.social"
            - name: PDS_PORT
              value: "3000"
            - name: PDS_RATE_LIMITS_ENABLED
              value: "true"
            - name: PDS_REPORT_SERVICE_DID
              value: "did:plc:ar7c4by46qjdydhdevvrndac"
            - name: PDS_REPORT_SERVICE_URL
              value: "https://mod.bsky.app"
          envFrom:
            - secretRef:
                name: bluesky-pds-env
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /pds
          startupProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            periodSeconds: 60
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 2
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-data
