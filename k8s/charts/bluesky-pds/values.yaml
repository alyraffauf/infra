replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 15

image:
  repository: ghcr.io/bluesky-social/pds
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

ports:
  - name: http
    containerPort: 3000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000

persistence:
  enabled: true
  storageClassName: longhorn-pg
  size: 10Gi
  mountPath: /pds

env:
  PDS_DATA_DIRECTORY: /pds
  PDS_BLOBSTORE_DISK_LOCATION: /pds/blocks
  PDS_BLOB_UPLOAD_LIMIT: "104857600"
  PDS_BSKY_APP_VIEW_DID: did:web:api.bsky.app
  PDS_BSKY_APP_VIEW_URL: https://api.bsky.app
  PDS_CRAWLERS: https://bsky.network
  PDS_DID_PLC_URL: https://plc.directory
  PDS_HOSTNAME: aly.social
  PDS_PORT: "3000"
  PDS_RATE_LIMITS_ENABLED: "true"
  PDS_REPORT_SERVICE_DID: did:plc:ar7c4by46qjdydhdevvrndac
  PDS_REPORT_SERVICE_URL: https://mod.bsky.app
  LOG_ENABLED: "true"

# Templated by common.secret from .Values.secret (vals + sops).
secret: {}
envFromSecret:
  - bluesky-pds-env

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /xrpc/_health, port: http }
    periodSeconds: 5
    failureThreshold: 60
  liveness:
    httpGet: { path: /xrpc/_health, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /xrpc/_health, port: http }
    periodSeconds: 5
    failureThreshold: 2

ingress:
  enabled: true
  className: traefik
  routes:
    - host: aly.social
      tlsSecret: aly-social-tls
