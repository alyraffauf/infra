replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 30

image:
  repository: ghcr.io/advplyr/audiobookshelf
  tag: 2.35.0@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
  pullPolicy: IfNotPresent

ports:
  - name: http
    containerPort: 80

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80

persistence:
  enabled: true
  storageClassName: longhorn
  size: 30Gi

extraVolumeMounts:
  - name: data
    mountPath: /config
    subPath: config
  - name: data
    mountPath: /metadata
    subPath: metadata
  - name: data
    mountPath: /podcasts
    subPath: podcasts

env:
  TZ: America/New_York

secret: {}
envFromSecret:
  - audiobookshelf-rclone

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /healthcheck, port: http }
    periodSeconds: 5
    failureThreshold: 60
  liveness:
    httpGet: { path: /healthcheck, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /healthcheck, port: http }
    periodSeconds: 5
    failureThreshold: 3

rclone:
  image:
    repository: rclone/rclone
    tag: 1.74@sha256:9ce0d49b611d3781233e25334e9e23d7af01e5546da7087f90d55f034ef13637
    pullPolicy: IfNotPresent
  remote: b2:aly-audiobooks
  mountPath: /audiobooks
  vfsCacheMaxAge: 168h
  vfsCacheMaxSize: 5G
  readOnly: true
  uid: 99
  gid: 100

ingress:
  enabled: true
  className: traefik
  routes:
    - host: audiobookshelf.cute.haus
      tlsSecret: cute-haus-tls
