replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 30

image:
  repository: ghcr.io/advplyr/audiobookshelf
  tag: 2.35.1@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
  pullPolicy: IfNotPresent

ports:
  - name: http
    containerPort: 80

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80

persistence:
  enabled: true
  storageClassName: longhorn
  size: 30Gi

extraVolumeMounts:
  - name: data
    mountPath: /config
    subPath: config
  - name: data
    mountPath: /metadata
    subPath: metadata
  - name: data
    mountPath: /podcasts
    subPath: podcasts

env:
  TZ: America/New_York

secret: {}
envFromSecret:
  - audiobookshelf-rclone

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /healthcheck, port: http }
    periodSeconds: 5
    failureThreshold: 60
  liveness:
    httpGet: { path: /healthcheck, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /healthcheck, port: http }
    periodSeconds: 5
    failureThreshold: 3

rclone:
  image:
    repository: rclone/rclone
    tag: 1.74@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
    pullPolicy: IfNotPresent
  remote: b2:aly-audiobooks
  mountPath: /audiobooks
  vfsCacheMaxAge: 168h
  vfsCacheMaxSize: 5G
  readOnly: true
  uid: 99
  gid: 100

ingress:
  enabled: true
  className: traefik
  routes:
    - host: audiobookshelf.cute.haus
      tlsSecret: cute-haus-tls
