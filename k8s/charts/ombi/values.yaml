replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 30

image:
  repository: lscr.io/linuxserver/ombi
  tag: latest@sha256:0caadf03b8047e1e6ec8396069bfd7aa2ecacb7d26cd67435dc1f334634d04ac
  pullPolicy: IfNotPresent

podSecurityContext:
  fsGroup: 1000

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

ports:
  - name: http
    containerPort: 3579

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3579

env:
  PUID: "1000"
  PGID: "1000"
  TZ: America/New_York

persistence:
  enabled: true
  storageClassName: longhorn
  size: 2Gi
  mountPath: /config

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /, port: http }
    periodSeconds: 10
    failureThreshold: 60
  liveness:
    httpGet: { path: /, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /, port: http }
    periodSeconds: 10
    failureThreshold: 3

ingress:
  enabled: true
  className: traefik
  routes:
    - host: ombi.cute.haus
      tlsSecret: cute-haus-tls
