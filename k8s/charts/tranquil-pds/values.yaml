replicaCount: 2
spread: true
terminationGracePeriodSeconds: 15

image:
  repository: atcr.io/tranquil.farm/tranquil-pds
  tag: latest@sha256:ecf127810609196f5d174285bf98b1fa4c80e60e0627e54f89fa341ee993d02b
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: atcr-pull

pullSecret:
  name: atcr-pull
  registry: atcr.io
  username: ""
  password: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

ports:
  - name: http
    containerPort: 3000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000

env:
  PDS_HOSTNAME: pds.cute.haus
  PDS_USER_HANDLE_DOMAINS: aly.social
  DATABASE_MIN_CONNECTIONS: "1"
  DATABASE_ACQUIRE_TIMEOUT_SECS: "60"
  SERVER_HOST: 0.0.0.0
  SERVER_PORT: "3000"
  BLOB_STORAGE_BACKEND: s3
  S3_BUCKET: aly-tranquil-blobs
  S3_ENDPOINT: https://s3.us-east-005.backblazeb2.com
  AWS_REGION: us-east-005
  PLC_DIRECTORY_URL: https://plc.directory
  CRAWLERS: https://bsky.network
  INVITE_CODE_REQUIRED: "true"
  SKIP_IMPORT_VERIFICATION: "false"
  # Email via existing Resend account (same SMTP creds as bluesky-pds).
  MAIL_FROM_ADDRESS: admin@aly.social
  MAIL_FROM_NAME: tranquil
  MAIL_SMARTHOST_HOST: smtp.resend.com
  MAIL_SMARTHOST_PORT: "2465"
  MAIL_SMARTHOST_USERNAME: resend
  MAIL_SMARTHOST_TLS: implicit
  # SSO client creds in tranquil-sso-env Secret, written by ansible.
  SSO_OIDC_ENABLED: "true"
  SSO_OIDC_ISSUER: https://id.cute.haus
  SSO_OIDC_DISPLAY_NAME: cute.haus

secret: {}
envFromSecret:
  - tranquil-pds-env
  - tranquil-sso-env

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /xrpc/_health, port: http }
    periodSeconds: 5
    failureThreshold: 60
  liveness:
    httpGet: { path: /xrpc/_health, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /xrpc/_health, port: http }
    periodSeconds: 5
    failureThreshold: 2

ingress:
  enabled: true
  className: traefik
  routes:
    - host: pds.cute.haus
      tlsSecret: cute-haus-tls
    - host: aly.social
      tlsSecret: aly-social-tls
    - host: "*.aly.social"
      tlsSecret: aly-social-tls
