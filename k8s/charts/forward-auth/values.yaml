# Per-app traefik-forward-auth deployments. Each entry renders a
# Deployment + Service + Ingress + Middleware + Secret pair.

image:
  repository: thomseddon/traefik-forward-auth
  tag: "2@sha256:69a2c985d2c518b6f0e77161a98628a148a5d964e4e84fc52cc62e19bb4da634"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 128Mi

ingressClassName: traefik
tlsSecret: cute-haus-tls
issuerURL: https://id.cute.haus
cookieDomain: cute.haus
lifetime: "604800"
logLevel: warn

# apps:
#   <key>:
#     signingSecret: ref+sops://...
apps: {}
