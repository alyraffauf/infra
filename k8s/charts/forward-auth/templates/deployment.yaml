{{- range $key, $app := .Values.apps }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forward-auth-{{ $key }}
  labels:
    app: forward-auth-{{ $key }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forward-auth-{{ $key }}
  template:
    metadata:
      labels:
        app: forward-auth-{{ $key }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 15
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $.Values.global.failover.fastTolerationSeconds | default 60 }}
      containers:
        - name: forward-auth
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4181
          env:
            - name: DEFAULT_PROVIDER
              value: oidc
            - name: PROVIDERS_OIDC_ISSUER_URL
              value: {{ $.Values.issuerURL | quote }}
            - name: AUTH_HOST
              value: "auth-{{ $key }}.cute.haus"
            - name: COOKIE_DOMAIN
              value: {{ $.Values.cookieDomain | quote }}
            # Each TFA pod needs its own cookie names, otherwise they overwrite each other's cookies on cute.haus.
            - name: COOKIE_NAME
              value: "_fa_{{ $key }}"
            - name: CSRF_COOKIE_NAME
              value: "_fa_csrf_{{ $key }}"
            - name: URL_PATH
              value: /_oauth
            - name: LIFETIME
              value: {{ $.Values.lifetime | quote }}
            - name: LOG_LEVEL
              value: {{ $.Values.logLevel | quote }}
          envFrom:
            - secretRef:
                name: forward-auth-{{ $key }}-env
            - secretRef:
                name: forward-auth-{{ $key }}-oidc-env
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          # No dedicated health endpoint; unauthenticated GET / returns a 3xx
          # redirect, which httpGet probes treat as success.
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 5
{{- end }}
