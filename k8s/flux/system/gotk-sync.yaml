apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 15m0s
  ref:
    branch: master
  url: https://github.com/alyraffauf/cute.haus
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 15m0s
  path: ./k8s/flux/system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
