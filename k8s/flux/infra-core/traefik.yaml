apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 15m
  releaseName: traefik
  targetNamespace: kube-system
  chart:
    spec:
      chart: traefik
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: 41.0.1
  values:
    deployment:
      kind: DaemonSet
    service:
      type: ClusterIP
    ports:
      web:
        hostPort: 80
        transport:
          respondingTimeouts:
            readTimeout: 600s
            writeTimeout: 0s
      websecure:
        hostPort: 443
        transport:
          respondingTimeouts:
            readTimeout: 600s
            writeTimeout: 0s
      ssh:
        port: 2222
        hostPort: 2222
        expose:
          default: true
        exposedPort: 2222
        protocol: TCP
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    additionalArguments:
      - --entrypoints.web.http.middlewares=default-error-pages@kubernetescrd
      - --entrypoints.websecure.http.middlewares=default-error-pages@kubernetescrd
    nodeSelector:
      cute.haus/ingress: "true"
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    priorityClassName: system-cluster-critical
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
