apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey-nextcloud
  namespace: flux-system
spec:
  interval: 15m
  releaseName: valkey-nextcloud
  targetNamespace: nextcloud
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./k8s/charts/valkey
      interval: 15m
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: cute-haus-global
      valuesKey: values.yaml
  # Nextcloud-only instance: file locks + session + cache are small and
  # ephemeral, so cap memory well below the shared instance's 1gb.
  values:
    args:
      - valkey-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - volatile-lru
