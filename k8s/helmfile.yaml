# Low history; CRD-heavy charts (cert-manager, traefik, cnpg) push each
# revision Secret to ~1MB, and the default of 10 stalls the apiserver.
helmDefaults:
  historyMax: 3

repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: traefik
    url: https://traefik.github.io/charts
  - name: longhorn
    url: https://charts.longhorn.io
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: tailscale
    url: https://pkgs.tailscale.com/helmcharts
  - name: jetstack
    url: https://charts.jetstack.io
  - name: nfd
    url: https://kubernetes-sigs.github.io/node-feature-discovery/charts
  - name: intel
    url: https://intel.github.io/helm-charts/

releases:
  # ─── Cluster infra ──────────────────────────────────────────────────────
  # Ingress, storage, postgres operator, tailscale operator. These come
  # before any app release that depends on their CRDs / StorageClasses.

  - name: traefik
    namespace: kube-system
    chart: traefik/traefik
    version: 41.0.1
    values:
      - deployment:
          kind: DaemonSet
        service:
          type: ClusterIP
        ports:
          web:
            hostPort: 80
            transport:
              respondingTimeouts:
                readTimeout: 600s
                writeTimeout: 0s
          websecure:
            hostPort: 443
            transport:
              respondingTimeouts:
                readTimeout: 600s
                writeTimeout: 0s
          ssh:
            port: 2222
            hostPort: 2222
            expose:
              default: true
            exposedPort: 2222
            protocol: TCP
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        additionalArguments:
          - "--entrypoints.web.http.middlewares=default-error-pages@kubernetescrd"
          - "--entrypoints.websecure.http.middlewares=default-error-pages@kubernetescrd"
        nodeSelector:
          cute.haus/ingress: "true"
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        priorityClassName: system-cluster-critical
        providers:
          kubernetesIngress:
            publishedService:
              enabled: true

  # B2 credentials Secret for longhorn's S3 backup target. Must exist before
  # longhorn references it via defaultSettings.backupTargetCredentialSecret.
  - name: longhorn-creds
    namespace: longhorn-system
    createNamespace: true
    chart: ./charts/longhorn-creds
    values:
      - values/global.yaml
      - values/secrets/longhorn-creds.yaml

  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: 1.12.0
    needs:
      - longhorn-system/longhorn-creds
    values:
      - defaultSettings:
          defaultDataPath: /var/lib/longhorn
          # One replica per zone (cloud, home); soft zone affinity spreads
          # across providers.
          defaultReplicaCount: 3
          replicaSoftAntiAffinity: false
          replicaZoneSoftAntiAffinity: true
          replicaAutoBalance: best-effort
          concurrentReplicaRebuildPerNodeLimit: 3
          # When a node goes NotReady, allow Longhorn to force-delete the
          # stuck pod so the volume can detach + reattach to the rescheduled
          # pod on a healthy node. Cuts failover from ~5min to ~2min.
          nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
          allowRecurringJobWhileVolumeDetached: true
        # S3-compatible backup target (B2). bucket@region is the longhorn
        # convention; AWS_ENDPOINTS in the longhorn-b2 Secret overrides region.
        defaultBackupStore:
          backupTarget: s3://aly-backups@us-east-005/cute.haus/longhorn
          backupTargetCredentialSecret: longhorn-b2
          pollInterval: 300
        persistence:
          defaultClass: false
          defaultClassReplicaCount: 2
          defaultDataLocality: best-effort
        ingress:
          enabled: false

  - name: cnpg
    namespace: cnpg-system
    createNamespace: true
    chart: cnpg/cloudnative-pg
    version: 0.29.0

  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: v1.20.3
    values:
      - crds:
          enabled: true

  - name: cert-manager-issuers
    namespace: cert-manager
    chart: ./charts/cert-manager-issuers
    needs:
      - cert-manager/cert-manager
    values:
      - values/global.yaml
      - values/secrets/cert-manager.yaml

  - name: tailscale-operator
    namespace: tailscale
    createNamespace: true
    chart: tailscale/tailscale-operator
    version: 1.98.4
    values:
      - values/secrets/tailscale-operator.yaml

  - name: node-feature-discovery
    namespace: node-feature-discovery
    createNamespace: true
    chart: nfd/node-feature-discovery
    version: 0.18.3

  - name: intel-device-plugins-operator
    namespace: intel-device-plugin
    createNamespace: true
    chart: intel/intel-device-plugins-operator
    version: 0.36.0
    needs:
      - node-feature-discovery/node-feature-discovery

  - name: intel-gpu-plugin
    namespace: intel-device-plugin
    chart: intel/intel-device-plugins-gpu
    version: 0.36.0
    needs:
      - intel-device-plugin/intel-device-plugins-operator
    values:
      - sharedDevNum: 4

  # Cluster observability. Host-level Grafana/Prometheus/Loki still live on
  # eterna; these releases restore Kubernetes-native metrics and pod logs.
  - name: kubernetes-prometheus
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus
    version: 29.13.0
    needs:
      - longhorn-system/longhorn
    values:
      - alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        server:
          global:
            scrape_interval: 30s
            evaluation_interval: 30s
          persistentVolume:
            storageClass: longhorn
            size: 20Gi
          retention: 30d
          retentionSize: 15GB
          service:
            type: NodePort
            nodePort: 30220
        kube-state-metrics:
          prometheusScrape: true
        prometheus-node-exporter:
          prometheus:
            monitor:
              enabled: false

  - name: kubernetes-alloy
    namespace: monitoring
    createNamespace: true
    chart: grafana/alloy
    version: 1.10.0
    values:
      - alloy:
          clustering:
            enabled: true
          configMap:
            content: |
              discovery.kubernetes "pods" {
                role = "pod"
              }

              loki.relabel "pods" {
                forward_to = [loki.write.default.receiver]

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }

                rule {
                  replacement  = "kubernetes-pods"
                  target_label = "job"
                }

                rule {
                  replacement  = "cute-haus"
                  target_label = "cluster"
                }
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.kubernetes.pods.targets
                forward_to = [loki.relabel.pods.receiver]

                clustering {
                  enabled = true
                }
              }

              loki.write "default" {
                endpoint {
                  url = "https://loki.narwhal-snapper.ts.net/loki/api/v1/push"
                }
              }

  # ─── Shared platform services ───────────────────────────────────────────

  # CNPG Cluster (3-instance HA postgres). Uses local-path for Postgres data;
  # CNPG handles HA via streaming replication, while B2 backups cover recovery.
  # Apps that need a database get a role + db here; see charts/pg-shared.
  # Backup config (B2) lives in values/secrets/pg-shared.yaml.
  - name: pg-shared
    namespace: cnpg-system
    chart: ./charts/pg-shared
    needs:
      - cnpg-system/cnpg
    values:
      - values/global.yaml
      - values/secrets/pg-shared.yaml

  # Shared cache/queue/broker backend; apps pick their own logical DB number.
  - name: valkey
    namespace: default
    chart: ./charts/valkey
    values:
      - values/global.yaml

  # Apache Tika (document parsing + OCR) and Gotenberg (doc-to-PDF).
  # Paperless offloads OCR and conversion to these.
  - name: tika
    namespace: default
    chart: ./charts/tika
    values:
      - values/global.yaml

  - name: gotenberg
    namespace: default
    chart: ./charts/gotenberg
    values:
      - values/global.yaml

  # Cloudflare Origin TLS Secrets per domain (morsels-blue). Apps reference
  # these by name in ingress.routes.
  - name: cluster-tls
    namespace: default
    chart: ./charts/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/cluster-tls.yaml

  # ─── Apps ───────────────────────────────────────────────────────────────

  - name: error-pages
    namespace: default
    chart: ./charts/error-pages
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: aly-codes
    namespace: default
    chart: ./charts/aly-codes
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: switchyard
    namespace: default
    chart: ./charts/switchyard
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: audiobookshelf
    namespace: default
    chart: ./charts/audiobookshelf
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/audiobookshelf.yaml

  - name: watsup
    namespace: default
    chart: ./charts/watsup
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: morsels
    namespace: default
    chart: ./charts/morsels
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: ombi
    namespace: default
    chart: ./charts/ombi
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: pocket-id
    namespace: default
    chart: ./charts/pocket-id
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
    values:
      - values/global.yaml
      - values/secrets/pocket-id.yaml

  - name: forward-auth
    namespace: default
    chart: ./charts/forward-auth
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/forward-auth.yaml

  - name: immich
    namespace: default
    chart: ./charts/immich
    needs:
      - default/cluster-tls
      - default/valkey
    values:
      - values/global.yaml
      - values/secrets/immich.yaml

  - name: jellyfin
    namespace: default
    chart: ./charts/jellyfin
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: plex
    namespace: default
    chart: ./charts/plex
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: navidrome
    namespace: default
    chart: ./charts/navidrome
    needs:
      - default/cluster-tls
      - default/forward-auth
    values:
      - values/global.yaml
      - values/secrets/navidrome.yaml

  - name: paperless
    namespace: default
    chart: ./charts/paperless
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
      - default/valkey
      - default/tika
      - default/gotenberg
    values:
      - values/global.yaml
      - values/secrets/paperless.yaml

  - name: nextcloud
    namespace: default
    chart: ./charts/nextcloud
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
      - default/valkey
    values:
      - values/global.yaml
      - values/secrets/nextcloud.yaml

  - name: collabora
    namespace: default
    chart: ./charts/collabora
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: uptime-kuma
    namespace: default
    chart: ./charts/uptime-kuma
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: vaultwarden
    namespace: default
    chart: ./charts/vaultwarden
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/vaultwarden.yaml

  # Postgres role + database managed declaratively by pg-shared.
  - name: forgejo
    namespace: default
    chart: ./charts/forgejo
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
      - default/valkey
    values:
      - values/global.yaml
      - values/secrets/forgejo.yaml

  - name: tranquil-pds
    namespace: default
    chart: ./charts/tranquil-pds
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
    values:
      - values/global.yaml
      - values/secrets/tranquil-pds.yaml

  # Ingress + Service + EndpointSlice for services that live OUTSIDE the
  # cluster (on tailnet IPs). e.g. plex/immich on jubilife, audiobookshelf
  # on eterna. See charts/external-routes/values.yaml for the route list.
  - name: external-routes
    namespace: default
    chart: ./charts/external-routes
    needs:
      - default/cluster-tls
      - tailscale/tailscale-operator
    values:
      - values/global.yaml
