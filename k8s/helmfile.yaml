# Keep helm release history small. Each revision is stored as a Secret
# containing gzip+base64 of all rendered manifests; CRD-bundling charts
# (cert-manager, traefik, cnpg) make each revision ~1MB, so the default 10
# means ~10MB per release and helm's pre-upgrade LIST query stalls the
# apiserver's HTTP/2 stream over the tailnet.
helmDefaults:
  historyMax: 3

repositories:
  - name: traefik
    url: https://traefik.github.io/charts
  - name: longhorn
    url: https://charts.longhorn.io
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: tailscale
    url: https://pkgs.tailscale.com/helmcharts
  - name: jetstack
    url: https://charts.jetstack.io

releases:
  # ─── Cluster infra ──────────────────────────────────────────────────────
  # Ingress, storage, postgres operator, tailscale operator. These come
  # before any app release that depends on their CRDs / StorageClasses.

  - name: traefik
    namespace: kube-system
    chart: traefik/traefik
    version: 40.0.1
    values:
      - deployment:
          kind: DaemonSet
        service:
          type: ClusterIP
        ports:
          web:
            hostPort: 80
          websecure:
            hostPort: 443
          ssh:
            port: 2222
            hostPort: 2222
            expose:
              default: true
            exposedPort: 2222
            protocol: TCP
        nodeSelector:
          cute.haus/ingress: "true"
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        priorityClassName: system-cluster-critical
        providers:
          kubernetesIngress:
            publishedService:
              enabled: true

  # B2 credentials Secret for longhorn's S3 backup target. Must exist before
  # longhorn references it via defaultSettings.backupTargetCredentialSecret.
  - name: longhorn-creds
    namespace: longhorn-system
    createNamespace: true
    chart: ./charts/longhorn-creds
    values:
      - values/secrets/longhorn-creds.yaml

  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: 1.11.2
    needs:
      - longhorn-system/longhorn-creds
    values:
      - defaultSettings:
          defaultDataPath: /var/lib/longhorn
          # 2 replicas per volume, hard zone anti-affinity → 1 of {home,
          # cloud-hetzner, cloud-netcup} per replica.
          defaultReplicaCount: 2
          replicaSoftAntiAffinity: false
          replicaZoneSoftAntiAffinity: false
          # Gradually move replicas around to satisfy zone constraints +
          # equalize disk pressure when nodes join/leave.
          replicaAutoBalance: best-effort
          # When a node goes NotReady, allow Longhorn to force-delete the
          # stuck pod so the volume can detach + reattach to the rescheduled
          # pod on a healthy node. Cuts failover from ~5min to ~2min.
          nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
          allowRecurringJobWhileVolumeDetached: true
        # S3-compatible backup target (B2). bucket@region is the longhorn
        # convention; AWS_ENDPOINTS in the longhorn-b2 Secret overrides region.
        defaultBackupStore:
          backupTarget: s3://aly-backups@us-east-005/cute.haus/longhorn
          backupTargetCredentialSecret: longhorn-b2
          pollInterval: 300
        persistence:
          defaultClass: false
          defaultClassReplicaCount: 2
          defaultDataLocality: best-effort
        ingress:
          enabled: false

  - name: cnpg
    namespace: cnpg-system
    createNamespace: true
    chart: cnpg/cloudnative-pg
    version: 0.28.1

  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: v1.20.2
    values:
      - crds:
          enabled: true

  - name: cert-manager-issuers
    namespace: cert-manager
    chart: ./charts/cert-manager-issuers
    needs:
      - cert-manager/cert-manager
    values:
      - values/secrets/cert-manager.yaml

  - name: tailscale-operator
    namespace: tailscale
    createNamespace: true
    chart: tailscale/tailscale-operator
    version: 1.96.5
    values:
      - values/secrets/tailscale-operator.yaml

  # ─── Shared platform services ───────────────────────────────────────────

  # CNPG Cluster (3-instance HA postgres) + longhorn-pg StorageClass.
  # Apps that need a database get a role + db here; see charts/pg-shared.
  # Backup config (B2) lives in values/secrets/pg-shared.yaml.
  - name: pg-shared
    namespace: cnpg-system
    chart: ./charts/pg-shared
    needs:
      - cnpg-system/cnpg
    values:
      - values/secrets/pg-shared.yaml

  # Cloudflare Origin TLS Secrets per domain (aly-codes, aly-social,
  # cute-haus, morsels-blue). Apps reference these by name in ingress.routes.
  - name: cluster-tls
    namespace: default
    chart: ./charts/cluster-tls
    values:
      - values/secrets/cluster-tls.yaml

  # ─── Apps ───────────────────────────────────────────────────────────────

  - name: aly-codes
    namespace: default
    chart: ./charts/aly-codes
    needs:
      - default/cluster-tls

  - name: watsup
    namespace: default
    chart: ./charts/watsup
    needs:
      - default/cluster-tls

  - name: morsels
    namespace: default
    chart: ./charts/morsels
    needs:
      - default/cluster-tls

  - name: ombi
    namespace: default
    chart: ./charts/ombi
    needs:
      - default/cluster-tls

  - name: uptime-kuma
    namespace: default
    chart: ./charts/uptime-kuma
    needs:
      - default/cluster-tls

  - name: vaultwarden
    namespace: default
    chart: ./charts/vaultwarden
    needs:
      - default/cluster-tls
    values:
      - values/secrets/vaultwarden.yaml

  # Postgres role + database managed declaratively by pg-shared.
  - name: forgejo
    namespace: default
    chart: ./charts/forgejo
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
    values:
      - values/secrets/forgejo.yaml

  - name: tranquil-pds
    namespace: default
    chart: ./charts/tranquil-pds
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
    values:
      - values/secrets/tranquil-pds.yaml

  # Ingress + Service + EndpointSlice for services that live OUTSIDE the
  # cluster (on tailnet IPs). e.g. plex/immich on jubilife, audiobookshelf
  # on eterna. See charts/external-routes/values.yaml for the route list.
  - name: external-routes
    namespace: default
    chart: ./charts/external-routes
    needs:
      - default/cluster-tls
      - tailscale/tailscale-operator
