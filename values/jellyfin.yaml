# Values overlay for the upstream jellyfin/jellyfin-helm chart.
# The full upstream defaults are at:
#   https://github.com/jellyfin/jellyfin-helm/blob/master/charts/jellyfin/values.yaml

# Tiered placement: prefer jubilife (NFS-local + GPU), fall back to eterna,
# then snowpoint. Never run on cloud-hetzner — those VPSes can't transcode.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: NotIn
              values: [cloud-hetzner]
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - { key: kubernetes.io/hostname, operator: In, values: [jubilife] }
      - weight: 50
        preference:
          matchExpressions:
            - { key: kubernetes.io/hostname, operator: In, values: [eterna] }
      - weight: 10
        preference:
          matchExpressions:
            - { key: kubernetes.io/hostname, operator: In, values: [snowpoint] }

tolerations:
  - key: node.kubernetes.io/not-ready
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 60
  - key: node.kubernetes.io/unreachable
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 60

resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits: { cpu: "4", memory: 4Gi }

# Required for VAAPI/QSV to actually open /dev/dri/renderD128. K8s'
# default device-cgroup controller blocks DRI access even when the
# device is mounted; privileged bypasses that.
securityContext:
  privileged: true

persistence:
  config:
    storageClass: longhorn
    size: 5Gi
  cache:
    enabled: true
    type: pvc
    storageClass: longhorn
    size: 10Gi
  media:
    # We don't use the chart's built-in media volume — jellyfin will see
    # /media/local (NFS from jubilife) and /media/cloud (rclone B2) via
    # the volumes/volumeMounts blocks below.
    enabled: false

# Extra volumes:
# - cloud-media: shared emptyDir between jellyfin and the rclone sidecar.
#   The rclone sidecar mounts the `combined` B2 remote here; jellyfin reads
#   /media/cloud through it via mountPropagation: HostToContainer.
# - local-media: NFS export from jubilife (already serving /mnt/Media to
#   the tailnet 100.64.0.0/10).
volumes:
  - name: cloud-media
    emptyDir: {}
  # Was a direct nfs: volume but that hangs pod startup if jubilife is
  # unreachable. The nfs-mount sidecar below retries in-pod so the pod
  # always starts; /media/local is just empty when jubilife is offline.
  - name: local-media
    emptyDir: {}
  # Intel Arc GPU passthrough for VAAPI/QSV transcoding. DirectoryOrCreate
  # so failing-over to a GPU-less node still mounts cleanly (jellyfin then
  # falls back to software transcoding).
  - name: dri
    hostPath:
      path: /dev/dri
      type: DirectoryOrCreate

volumeMounts:
  - name: cloud-media
    mountPath: /media/cloud
    mountPropagation: HostToContainer
  - name: local-media
    mountPath: /media/local
    mountPropagation: HostToContainer
    readOnly: true
  - name: dri
    mountPath: /dev/dri

# Rclone sidecar: mounts the `combined` B2 remote at /media/cloud. Needs
# CAP_SYS_ADMIN for FUSE. envFrom pulls the rclone config from the
# jellyfin-rclone Secret rendered by the jellyfin-creds chart.
extraContainers:
  - name: rclone
    image: rclone/rclone:latest
    args:
      - mount
      - "combined:"
      - /media/cloud
      - --allow-non-empty
      - --vfs-cache-mode=full
      - --vfs-cache-max-age=336h
      - --vfs-cache-max-size=20G
      - --vfs-read-ahead=1G
      - --buffer-size=128M
      - --dir-cache-time=1h
      - --read-only
      - --uid=1000
      - --gid=1000
      - --umask=022
      - --log-level=INFO
    securityContext:
      privileged: true
    envFrom:
      - secretRef:
          name: jellyfin-rclone
    volumeMounts:
      - name: cloud-media
        mountPath: /media/cloud
        mountPropagation: Bidirectional

  # NFS sidecar: mounts jubilife:/mnt/Media at /media/local. Retries in a
  # loop so pod startup doesn't block on jubilife being reachable. Bidirectional
  # propagation here + HostToContainer on jellyfin means the mount appears in
  # jellyfin's namespace whenever it succeeds (and disappears if it fails).
  - name: nfs-mount
    image: alpine:3
    securityContext:
      privileged: true
    # `mountpoint -q` returns true on the k8s emptyDir bind, so we'd never
    # try the NFS mount on top. `findmnt` would work but isn't in
    # nfs-utils — checking /proc/mounts directly is more reliable and
    # avoids stacking mounts when the check binary is missing.
    command:
      - sh
      - -c
      - |
        set -u
        apk add -q nfs-utils
        while true; do
          if ! grep -q " /media/local nfs " /proc/mounts; then
            echo "mounting jubilife:/mnt/Media on /media/local"
            mount -t nfs -o vers=3,ro,nolock,soft,timeo=50,retrans=3 jubilife:/mnt/Media /media/local \
              || echo "mount failed (rc=$?), retrying in 60s"
          fi
          sleep 60
        done
    volumeMounts:
      - name: local-media
        mountPath: /media/local
        mountPropagation: Bidirectional

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: jellyfin.cute.haus
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts: [jellyfin.cute.haus]
      secretName: cute-haus-tls
