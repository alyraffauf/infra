name: check-config

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  pull_request:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - .github/**
      - _img/**
  workflow_dispatch: {}

jobs:
  consistency-checks:
    name: Bun consistency checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 1 }
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/check.ts

  chart-templates:
    name: helm template each chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 1 }
      - uses: azure/setup-helm@v5
      - uses: azure/setup-kubectl@v5
      - name: helm template each local chart with the generated global values
        run: |
          set -euo pipefail
          # Source the same cute-haus-global values Flux feeds charts via
          # valuesFrom, straight from the generated ConfigMap — no plain values
          # file to drift. Full valuesFrom-resolving render lives in local
          # `just flux-test`; it can't run in public CI because decrypting the
          # SOPS secrets layer risks leaking plaintext into public logs.
          values="$(mktemp)"
          kubectl kustomize k8s/flux/sources \
            | yq e 'select(.kind == "ConfigMap" and .metadata.name == "cute-haus-global") | .data["values.yaml"]' - \
            > "$values"
          for chart in k8s/charts/*/; do
            name="$(basename "$chart")"
            [[ "$name" == "common" ]] && continue
            echo "::group::$name"
            helm dependency update "$chart" >/dev/null
            helm template "$chart" -f "$values" >/dev/null
            echo "::endgroup::"
          done

  flux-kustomize:
    name: flux kustomize build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 1 }
      - uses: azure/setup-kubectl@v5
      - name: kubectl kustomize each flux layer
        run: |
          set -e
          for dir in \
            k8s/flux/system \
            k8s/flux/sources \
            k8s/flux/secrets \
            k8s/flux/infra-crds \
            k8s/flux/infra-core \
            k8s/flux/platform \
            k8s/flux/apps \
            k8s/flux/external-routes; do
            echo "::group::$dir"
            kubectl kustomize "$dir" >/dev/null
            echo "::endgroup::"
          done

  ansible-syntax:
    name: ansible playbook syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v7
        with: { python-version: "3.x" }
      - name: Install ansible-core + collections
        run: |
          pip install --quiet ansible-core
          ansible-galaxy collection install kubernetes.core community.sops
      - name: Syntax check every playbook
        run: |
          set -e
          for playbook in ansible/playbooks/*.yml; do
            echo "::group::$playbook"
            ansible-playbook --syntax-check "$playbook"
            echo "::endgroup::"
          done

  terraform-validate:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 1 }
      - uses: hashicorp/setup-terraform@v4
      - run: terraform -chdir=terraform fmt -check -diff
      - run: terraform -chdir=terraform init -backend=false -input=false
      - run: terraform -chdir=terraform validate
